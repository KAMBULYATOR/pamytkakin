<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наше Событие</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Стили для фото */
        .photo-gallery img { width: 100%; border-radius: 10px; margin-bottom: 20px; }
        
        /* Таймер */
        #timer { font-size: 1.5rem; font-weight: bold; color: #333; margin: 20px 0; background: #eee; padding: 15px; border-radius: 10px; }
        
        /* Музыкальная кнопка */
        .music-btn { background: #ff4757; color: white; border: none; padding: 10px 25px; border-radius: 20px; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        .music-btn:hover { background: #ff6b81; }

        /* Карта */
        .map-container { margin-top: 30px; border-radius: 10px; overflow: hidden; height: 300px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Добро пожаловать!</h1>
    
    <div class="photo-gallery">
        <img src="https://via.placeholder.com/800x400" alt="Главное фото">
    </div>

    <div id="timer">Загрузка таймера...</div>

    <button class="music-btn" onclick="toggleMusic()">🎵 Включить музыку</button>
    <audio id="bg-music" loop>
        <source src="твой-файл-музыки.mp3" type="audio/mpeg">
    </audio>

    <div class="map-container">
        <a class="dg-widget-link" href="https://2gis.ru/voronezh/firm/4363220556535560/center/39.2002,51.6607/zoom/16?utm_medium=widget-source&utm_campaign=firms&utm_content=4363220556535560">Посмотреть на карте Воронежа</a>
        <script charset="utf-8" src="https://widgets.2gis.com/js/external/widget_loader.js"></script>
        <script>new DGWidgetLoader({"width":"100%","height":"300","pos":{"lat":51.6607,"lon":39.2002,"zoom":16},"opt":{"city":"voronezh"},"org":"4363220556535560"});</script>
    </div>
</div>

<script>
    // Логика таймера (замени дату на нужную)
    const targetDate = new Date("August 10, 2026 00:00:00").getTime();

    function updateTimer() {
        const now = new Date().getTime();
        const diff = targetDate - now;

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

        document.getElementById("timer").innerHTML = `До события осталось: ${days}д ${hours}ч ${mins}м`;
    }
    setInterval(updateTimer, 1000);

    // Логика музыки
    const music = document.getElementById("bg-music");
    function toggleMusic() {
        if (music.paused) {
            music.play();
            document.querySelector(".music-btn").innerText = "⏸ Пауза";
        } else {
            music.pause();
            document.querySelector(".music-btn").innerText = "🎵 Включить музыку";
        }
    }
</script>

</body>
</html>
